<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mənim AI Köməkçim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen">
        <div class="logo-wrapper">
            <img src="logo.png" alt="Logo" class="zoom-in-out-logo">
        </div>
    </div>

    <div id="main-container" class="hidden">
        
        <header class="chat-header">
            <h3>AI Köməkçisi</h3>
            <span class="status-dot"></span>
        </header>

        <div id="chat-window">
            <div class="message ai-message">
                <p>Salam! Mən sizin süni intellekt köməkçinizəm. Bu gün sizə necə kömək edə bilərəm?</p>
            </div>
            </div>

        <footer class="input-area">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın...">
            <button onclick="sendMessage()" id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
