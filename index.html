<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CruelX AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-content">
            <img src="logo.png" alt="Logo" class="cinema-logo">
            <div class="loader-line"></div>
            <p class="wait-msg">Sistem hazırlanır...</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="chat-wrapper anim-pop-in">
            <header>
                <div class="status-box">
                    <div class="dot"></div>
                    <span>CruelX Online</span>
                </div>
            </header>
            
            <div id="chat-screen">
                <div class="msg bot-msg">Xoş gəldiniz! Sizin üçün nə edə bilərəm?</div>
            </div>

            <div class="input-container">
                <input type="text" id="user-input" placeholder="Sualınızı bura yazın...">
                <button onclick="send()">Göndər</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
